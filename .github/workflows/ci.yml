name: CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "postgresql://mock"
          AUTH_SECRET: "test-secret-never-use-in-prod"
          AUTH_GOOGLE_ID: "mock"
          AUTH_GOOGLE_SECRET: "mock"
          STRIPE_SECRET_KEY: "mock"
          STRIPE_PRO_PRICE_ID: "mock"
          WHATSAPP_API_URL: "mock"
          WHATSAPP_API_KEY: "mock"
          RESEND_API_KEY: "mock"
          RESEND_FROM_EMAIL: "mock@mock.com"

      - name: Run Unit Tests (Vitest)
        run: npm run test
        env:
          TZ: "America/Sao_Paulo"

  e2e:
    name: End-to-End Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build # Só roda se passar no build, lint e vitest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          AUTH_SECRET: "test-secret-never-use-in-prod"
          AUTH_GOOGLE_ID: "mock"
          AUTH_GOOGLE_SECRET: "mock"
          DATABASE_URL: "postgresql://mock"
          STRIPE_SECRET_KEY: "mock"
          STRIPE_PRO_PRICE_ID: "mock"
          WHATSAPP_API_URL: "mock"
          WHATSAPP_API_KEY: "mock"
          RESEND_API_KEY: "mock"
          RESEND_FROM_EMAIL: "mock@mock.com"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
